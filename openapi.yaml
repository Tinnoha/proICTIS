openapi: 3.0.3
info:
  title: Equipment Booking System API (реальная реализация)
  version: 1.0.0

tags:
  - name: Auth
  - name: Users
  - name: Equipment
  - name: Types
  - name: Bookings

components:
  parameters:
    UserIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User identifier
    EquipmentIdPath:
      name: EquipmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Equipment identifier
    EquipmentTypePath:
      name: type
      in: path
      required: true
      schema:
        type: string
      description: Type of equipment (e.g., VR, 3D printer)
    BookingIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Booking identifier
    TypeIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Type of equipment identifier

  schemas:
    ErrorResponse:
      type: object
      required: [Error, Time]
      properties:
        Error:
          type: string
        Time:
          type: string
          format: date-time

    User:
      type: object
      required: [Id, FirstName, SecondName, Email, Role]
      properties:
        Id:
          type: string
          format: uuid
        FirstName:
          type: string
        SecondName:
          type: string
        Email:
          type: string
          format: email
        AvatarURL:
          type: string
          nullable: true
        Role:
          type: string
          enum: [student, admin, super_admin]
        TokenProvider:
          type: integer

    Equipment:
      type: object
      required: [Id, Name, TypeOfEquipment, Auditory, IsActive]
      properties:
        Id:
          type: string
          format: uuid
        Name:
          type: string
        Description:
          type: string
          nullable: true
        PhotoURL:
          type: string
          nullable: true
        TypeOfEquipment:
          type: string
        Auditory:
          type: string
        IsActive:
          type: boolean

    TypeOfEquipment:
      type: object
      required: [Id, Name]
      properties:
        Id:
          type: string
          format: uuid
        Name:
          type: string

    Booking:
      type: object
      required: [ID, UserId, EquipmentId, BookStart, BookEnd, Status]
      properties:
        ID:
          type: string
          format: uuid
        UserId:
          type: string
          format: uuid
        EquipmentId:
          type: string
          format: uuid
        BookStart:
          type: string
          format: date-time
        BookEnd:
          type: string
          format: date-time
        Status:
          type: string
          enum: [Waiting answer, Active, Cancel, Returned]

    # Request bodies
    AdminOnlyRequest:
      type: object
      required: [admin_id]
      properties:
        admin_id:
          type: string
          format: uuid

    EmailRequest:
      type: object
      required: [AdminId, Email]
      properties:
        AdminId:
          type: string
          format: uuid
        Email:
          type: string
          format: email

    AdminPromotionRequest:
      type: object
      required: [first_admin, second_admin]
      properties:
        first_admin:
          type: string
          format: uuid
          description: ID of super admin performing the action
        second_admin:
          type: string
          format: uuid
          description: ID of user to promote

    EquipmentCreateRequest:
      type: object
      required: [admin_id, tovars]
      properties:
        admin_id:
          type: string
          format: uuid
        tovars:
          type: array
          items:
            type: object
            required: [name, type, auditory]
            properties:
              name:
                type: string
              description:
                type: string
              photo_url:
                type: string
              type:
                type: string
              auditory:
                type: string
              is_active:
                type: boolean
                default: true

    EquipmentEditRequest:
      type: object
      required: [admin_id, Equipment]
      properties:
        admin_id:
          type: string
          format: uuid
        Equipment:
          $ref: '#/components/schemas/Equipment'

    EquipmentStatusRequest:
      type: object
      required: [admin_id, active]
      properties:
        admin_id:
          type: string
          format: uuid
        active:
          type: boolean

    TypesCreateRequest:
      type: object
      required: [admin_id, types]
      properties:
        admin_id:
          type: string
          format: uuid
        types:
          type: array
          items:
            $ref: '#/components/schemas/TypeOfEquipment'

    TypeUpdateRequest:
      type: object
      required: [admin_id, type]
      properties:
        admin_id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/TypeOfEquipment'

    BookingCreateRequest:
      type: object
      required: [user_id, enviromt_id, start, end]
      properties:
        user_id:
          type: string
          format: uuid
        enviromt_id:
          type: string
          format: uuid
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time

    BookingStatusUpdateRequest:
      type: object
      required: [admin_id, status]
      properties:
        admin_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [Waiting answer, Active, Cancel, Returned]

    BookingReturnRequest:
      type: object
      required: [admin_id]
      properties:
        admin_id:
          type: string
          format: uuid

paths:
  # ========== Auth ==========
  /Regist:
    get:
      tags: [Auth]
      summary: Initiate Yandex OAuth login
      responses:
        '307':
          description: Redirect to Yandex OAuth

  /callback:
    get:
      tags: [Auth]
      summary: Yandex OAuth callback
      responses:
        '307':
          description: Redirect to frontend after successful login
        '500':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ========== Users ==========
  /User:
    get:
      tags: [Users]
      summary: Get all users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /User/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /User/email:
    get:
      tags: [Users]
      summary: Get user by email (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /User/admin:
    patch:
      tags: [Users]
      summary: Make user an admin (requires super admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminPromotionRequest'
      responses:
        '200':
          description: User promoted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not super admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /User/SuperAdmin:
    patch:
      tags: [Users]
      summary: Make user a super admin (requires super admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminPromotionRequest'
      responses:
        '200':
          description: User promoted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not super admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ========== Equipment ==========
  /Equipment:
    get:
      tags: [Equipment]
      summary: Get all equipment
      responses:
        '200':
          description: List of equipment
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Equipment'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Equipment]
      summary: Create new equipment (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentCreateRequest'
      responses:
        '201':
          description: Equipment created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Equipment'
        '400':
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /Equipment/type/{type}:
    get:
      tags: [Equipment]
      summary: Get equipment by type
      parameters:
        - $ref: '#/components/parameters/EquipmentTypePath'
      responses:
        '200':
          description: List of equipment of given type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Equipment'
        '404':
          description: No equipment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /Equipment/id/{id}:
    get:
      tags: [Equipment]
      summary: Get equipment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Equipment object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Equipment'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /Equipment/{EquipmentId}:
    patch:
      tags: [Equipment]
      summary: Edit equipment (admin only)
      parameters:
        - $ref: '#/components/parameters/EquipmentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentEditRequest'
      responses:
        '200':
          description: Updated equipment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Equipment'
        '400':
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Equipment]
      summary: Delete equipment (admin only)
      parameters:
        - $ref: '#/components/parameters/EquipmentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminOnlyRequest'
      responses:
        '204':
          description: Deleted (no content)
        '403':
          description: Forbidden (not admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /Equipment/status/{EquipmentId}:
    patch:
      tags: [Equipment]
      summary: Change equipment active status (admin only)
      parameters:
        - $ref: '#/components/parameters/EquipmentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Equipment'
        '403':
          description: Forbidden (not admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ========== Types ==========
  /Types:
    get:
      tags: [Types]
      summary: Get all equipment types
      responses:
        '200':
          description: List of types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TypeOfEquipment'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Types]
      summary: Create new equipment types (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TypesCreateRequest'
      responses:
        '201':
          description: Types created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TypeOfEquipment'
        '400':
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /Types/{id}:
    patch:
      tags: [Types]
      summary: Update equipment type (admin only)
      parameters:
        - $ref: '#/components/parameters/TypeIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TypeUpdateRequest'
      responses:
        '200':
          description: Updated type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TypeOfEquipment'
        '400':
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Types]
      summary: Delete equipment type (admin only)
      parameters:
        - $ref: '#/components/parameters/TypeIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminOnlyRequest'
      responses:
        '204':
          description: Deleted (no content)
        '403':
          description: Forbidden (not admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ========== Bookings ==========
  /Booking:
    get:
      tags: [Bookings]
      summary: Get all bookings
      responses:
        '200':
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Bookings]
      summary: Create a new booking (status = "Waiting answer")
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Invalid data or equipment already booked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /Booking/user/{id}:
    get:
      tags: [Bookings]
      summary: Get bookings by user ID
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: List of user's bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '404':
          description: User not found or no bookings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /Booking/equipment/{id}:
    get:
      tags: [Bookings]
      summary: Get bookings by equipment ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of equipment's bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '404':
          description: Equipment not found or no bookings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /Booking/{id}:
    put:
      tags: [Bookings]
      summary: Update booking status (admin only). Use status "Cancel" to delete.
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingStatusUpdateRequest'
      responses:
        '200':
          description: Status updated (returns booking if status not Cancel/Returned)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '204':
          description: Booking cancelled or returned (deleted, no content)
        '400':
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /Booking/return/{id}:
    put:
      tags: [Bookings]
      summary: Return equipment (admin only). Deletes the booking.
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingReturnRequest'
      responses:
        '204':
          description: Booking deleted (equipment returned)
        '403':
          description: Forbidden (not admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'