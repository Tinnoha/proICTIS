openapi: 3.0.3
info:
  title: Equipment Booking System API
  version: "1.0.0"

tags:
  - name: Users
  - name: Equipment
  - name: Bookings
  - name: Types

components:
  parameters:
    UserIdQuery:
      name: user_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
      description: User identifier
    EquipmentIdQuery:
      name: equipment_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
      description: Equipment identifier
    EquipmentTypeQuery:
      name: type
      in: query
      required: true
      schema:
        type: string
      description: Type of equipment (e.g., VR, 3D printer, etc.)
    BookingIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Booking identifier
    EquipmentIdPath:
      name: equipment_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Equipment identifier
    UserIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User identifier
    
  schemas:
    ErrorResponse:
      type: object
      required: [error, timestamp]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - NOT_FOUND
                - INTERNAL_ERROR
                - ALREADY_EXISTS
                - WRONG_DATA
                - EQUIPMENT_NOT_ACTIVE
                - EQUIPMENT_TAKEN
                - USER_NOT_FOUND
                - EMAIL_EXISTS
                - BOOKING_NOT_WAIT_STATUS
                - BOOKING_NOT_WAIT_TIME_STATUS
            message:
              type: string
        timestamp:
          type: string
          format: date-time
    
    User:
      type: object
      required: [id, first_name, second_name, email, role]
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        second_name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          nullable: true
        role:
          type: string
          enum: [student, admin, super_admin]
        token_provider:
          type: integer
          description: Used for registration via Yandex API
    
    Equipment:
      type: object
      required: [id, name, type, auditory, is_active]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        photo_url:
          type: string
          nullable: true
        type:
          type: string
          description: Type of equipment (e.g., VR, 3D printer, etc.)
        auditory:
          type: string
          description: Location where equipment is stored
        is_active:
          type: boolean
    
    TypeOfEquipment:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Type name (e.g., VR, 3D printer, etc.)
    
    Booking:
      type: object
      required: [id, user_id, equipment_id, book_start, book_end, status]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        equipment_id:
          type: string
          format: uuid
        book_start:
          type: string
          format: date-time
        book_end:
          type: string
          format: date-time
        status:
          type: string
          enum: [Wait, Wait Time for Booking, Active]
          description: |
            Wait - booking request created (pending approval)
            Wait Time for Booking - approved, waiting to be picked up
            Active - equipment picked up, in use
    
    CreateBookingRequest:
      type: object
      required: [user_id, equipment_id, book_start, book_end]
      properties:
        user_id:
          type: string
          format: uuid
        equipment_id:
          type: string
          format: uuid
        book_start:
          type: string
          format: date-time
          description: Start of equipment rental
        book_end:
          type: string
          format: date-time
          description: End of equipment rental
    
    CreateUserRequest:
      type: object
      required: [first_name, second_name, email]
      properties:
        first_name:
          type: string
        second_name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          nullable: true
        token_provider:
          type: integer
          default: 0
          description: Used for registration via Yandex API
    
    CreateEquipmentRequest:
      type: object
      required: [name, type, auditory]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        photo_url:
          type: string
          nullable: true
        type:
          type: string
          description: Type of equipment (e.g., VR, 3D printer, etc.)
        auditory:
          type: string
          description: Location where equipment is stored
        is_active:
          type: boolean
          default: true
    
    UpdateEquipmentRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        photo_url:
          type: string
          nullable: true
        type:
          type: string
          description: Type of equipment (e.g., VR, 3D printer, etc.)
        auditory:
          type: string
          description: Location where equipment is stored
    
    SetActiveRequest:
      type: object
      required: [is_active]
      properties:
        is_active:
          type: boolean
    
    CheckAvailabilityRequest:
      type: object
      required: [equipment_id, start, end]
      properties:
        equipment_id:
          type: string
          format: uuid
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
    
    EmailRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    
    AdminRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid

paths:
  # ==================== USERS ====================
  /user:
    post:
      tags: [Users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: EMAIL_EXISTS
                  message: email already exists
                timestamp: "2024-01-01T12:00:00Z"
  get:  
    tags: [Users]
    summary: Get all users
    responses:
      '200':
        description: List of all users
        content:
          application/json:
            schema:
              type: object
              properties:
                users:
                  type: array
                  items:
                    $ref: '#/components/schemas/User'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  /user/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User information
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /user/email:
    post:
      tags: [Users]
      summary: Get user by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: User information
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /user/admin:
    patch:
      tags: [Users]
      summary: Make user an admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRequest'
      responses:
        '200':
          description: User promoted to admin
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /user/superadmin:
    patch:
      tags: [Users]
      summary: Make user a super admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRequest'
      responses:
        '200':
          description: User promoted to super admin
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /Regist:
    get:
      tags: [Users]
      summary: Initiate Yandex OAuth login
      responses:
        '307':
          description: Redirect to Yandex OAuth
  
  /auth/yandex/callback:
    get:
      tags: [Users]
      summary: Yandex OAuth callback
      responses:
        '307':
          description: Redirect to frontend after successful login
        '500':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== EQUIPMENT ====================
  /equipment:
    get:
      tags: [Equipment]
      summary: Get all equipment
      responses:
        '200':
          description: List of all equipment
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment:
                    type: array
                    items:
                      $ref: '#/components/schemas/Equipment'
    
    post:
      tags: [Equipment]
      summary: Create new equipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEquipmentRequest'
      responses:
        '201':
          description: Equipment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment:
                    $ref: '#/components/schemas/Equipment'
        '400':
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /equipment/{equipment_id}:
    get:
      tags: [Equipment]
      summary: Get equipment by ID
      parameters:
        - $ref: '#/components/parameters/EquipmentIdPath'
      responses:
        '200':
          description: Equipment information
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment:
                    $ref: '#/components/schemas/Equipment'
        '404':
          description: Equipment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    patch:
      tags: [Equipment]
      summary: Edit equipment
      parameters:
        - $ref: '#/components/parameters/EquipmentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEquipmentRequest'
      responses:
        '200':
          description: Equipment updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment:
                    $ref: '#/components/schemas/Equipment'
        '404':
          description: Equipment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    delete:
      tags: [Equipment]
      summary: Delete equipment
      parameters:
        - $ref: '#/components/parameters/EquipmentIdPath'
      responses:
        '204':
          description: Equipment deleted
        '404':
          description: Equipment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /equipment/by-type:
    get:
      tags: [Equipment]
      summary: Get equipment by type
      parameters:
        - $ref: '#/components/parameters/EquipmentTypeQuery'
      responses:
        '200':
          description: List of equipment of specified type
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment:
                    type: array
                    items:
                      $ref: '#/components/schemas/Equipment'
        '404':
          description: No equipment found with this type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /equipment/{equipment_id}/status:
    patch:
      tags: [Equipment]
      summary: Change equipment active status
      parameters:
        - $ref: '#/components/parameters/EquipmentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetActiveRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment:
                    $ref: '#/components/schemas/Equipment'
        '404':
          description: Equipment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /equipment/types:
    get:
      tags: [Types]
      summary: Get all equipment types
      responses:
        '200':
          description: List of equipment types
          content:
            application/json:
              schema:
                type: object
                properties:
                  types:
                    type: array
                    items:
                      $ref: '#/components/schemas/TypeOfEquipment'

  # ==================== BOOKINGS ====================
  /bookings:
    get:
      tags: [Bookings]
      summary: Get all bookings
      responses:
        '200':
          description: List of all bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
    
    post:
      tags: [Bookings]
      summary: Create new booking request (status: Wait)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Booking request created (pending approval)
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: '#/components/schemas/Booking'
        '400':
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User or equipment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Equipment already booked for the specified time period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: EQUIPMENT_TAKEN
                  message: equipment is already booked for this time period
                timestamp: "2024-01-01T12:00:00Z"

  /bookings/by-user:
    get:
      tags: [Bookings]
      summary: Get user's bookings
      parameters:
        - $ref: '#/components/parameters/UserIdQuery'
      responses:
        '200':
          description: List of user's bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /bookings/by-equipment:
    get:
      tags: [Bookings]
      summary: Get equipment's bookings
      parameters:
        - $ref: '#/components/parameters/EquipmentIdQuery'
      responses:
        '200':
          description: List of equipment's bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
        '404':
          description: Equipment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /bookings/{id}:
    delete:
      tags: [Bookings]
      summary: Cancel booking (removes from DB)
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      responses:
        '204':
          description: Booking cancelled and removed
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    patch:
      tags: [Bookings]
      summary: Accept booking request (changes status from Wait to Wait Time for Booking)
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [Wait Time for Booking]
      responses:
        '200':
          description: Booking approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: '#/components/schemas/Booking'
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Booking not in Wait status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: BOOKING_NOT_WAIT_STATUS
                  message: booking is not in Wait status
                timestamp: "2024-01-01T12:00:00Z"

  /bookings/{id}/pickup:
    patch:
      tags: [Bookings]
      summary: Mark equipment as picked up (changes status to Active)
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      responses:
        '200':
          description: Equipment marked as picked up
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: '#/components/schemas/Booking'
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Booking not in Wait Time for Booking status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: BOOKING_NOT_WAIT_TIME_STATUS
                  message: booking is not in Wait Time for Booking status
                timestamp: "2024-01-01T12:00:00Z"

  /bookings/check-availability:
    post:
      tags: [Bookings]
      summary: Check equipment availability for a time period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckAvailabilityRequest'
      responses:
        '200':
          description: Availability check result
          content:
            application/json:
              schema:
                type: object
                required: [available, equipment_id]
                properties:
                  available:
                    type: boolean
                  equipment_id:
                    type: string
                    format: uuid
                  message:
                    type: string
        '404':
          description: Equipment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /bookings/{id}/return:
    patch:
      tags: [Bookings]
      summary: Return equipment (completes booking and removes it from DB)
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      responses:
        '204':
          description: Equipment returned and booking removed
        '404':
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'