openapi: 3.0.3
info:
  title: Equipment Booking System API (реальная реализация)
  version: 1.0.0

tags:
  - name: Auth
  - name: Users
  - name: Equipment
  - name: Bookings

components:
  parameters:
    UserIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentIdPath:
      name: EquipmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipmentTypePath:
      name: type
      in: path
      required: true
      schema:
        type: string
    BookingIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserIdPathAlt:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ErrorResponse:
      type: object
      required: [error, timestamp]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [NOT_FOUND, INTERNAL_ERROR, ALREADY_EXISTS, WRONG_DATA]
            message:
              type: string
        timestamp:
          type: string
          format: date-time

    User:
      type: object
      required: [id, first_name, second_name, email, role]
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        second_name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          nullable: true
        role:
          type: string
          enum: [student, admin, super_admin]
        tokenProvider:
          type: integer

    Equipment:
      type: object
      required: [id, name, type, auditory, is_active]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        photo_url:
          type: string
          nullable: true
        type:
          type: string
        auditory:
          type: string
        is_active:
          type: boolean

    Booking:
      type: object
      required: [id, user_id, equipment_id, book_start, book_end, status]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        equipment_id:
          type: string
          format: uuid
        book_start:
          type: string
          format: date-time
        book_end:
          type: string
          format: date-time
        status:
          type: string
          enum: [Waiting answer, Active, Cancel, Returned]

    # Запросы
    EmailRequest:
      type: object
      required: [admin_id, email]
      properties:
        admin_id:
          type: string
          format: uuid
        email:
          type: string
          format: email

    AdminPromotionRequest:
      type: object
      required: [first_admin, second_admin]
      properties:
        first_admin:
          type: string
          format: uuid
          description: ID администратора, выполняющего действие (должен быть super_admin)
        second_admin:
          type: string
          format: uuid
          description: ID пользователя, которого повышают

    EquipmentCreateRequest:
      type: object
      required: [admin_id, tovars]
      properties:
        admin_id:
          type: string
          format: uuid
        tovars:
          type: array
          items:
            type: object
            required: [name, type, auditory]
            properties:
              name:
                type: string
              description:
                type: string
              photo_url:
                type: string
              type:
                type: string
              auditory:
                type: string
              is_active:
                type: boolean
                default: true

    EquipmentUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        photo_url:
          type: string
        type:
          type: string
        auditory:
          type: string

    EquipmentStatusRequest:
      type: object
      required: [admin_id, active]
      properties:
        admin_id:
          type: string
          format: uuid
        active:
          type: boolean

    BookingCreateRequest:
      type: object
      required: [user_id, enviromt_id, start, end]
      properties:
        user_id:
          type: string
          format: uuid
        enviromt_id:
          type: string
          format: uuid
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time

    BookingStatusUpdateRequest:
      type: object
      required: [admin_id, status]
      properties:
        admin_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [Waiting answer, Active, Cancel, Returned]

paths:
  # ========== Auth ==========
  /Regist:
    get:
      tags: [Auth]
      summary: Initiate Yandex OAuth login
      responses:
        '307':
          description: Redirect to Yandex OAuth

  /callback:
    get:
      tags: [Auth]
      summary: Yandex OAuth callback
      responses:
        '307':
          description: Redirect to frontend after successful login
        '500':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ========== Users ==========
  /User:
    get:
      tags: [Users]
      summary: Get all users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /User/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /User/email:
    get:
      tags: [Users]
      summary: Get user by email (requires admin rights)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid request
        '403':
          description: Forbidden (not admin)
        '404':
          description: User not found

  /User/admin:
    patch:
      tags: [Users]
      summary: Make user an admin (requires super_admin rights)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminPromotionRequest'
      responses:
        '200':
          description: User promoted
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid data
        '403':
          description: Forbidden
        '404':
          description: User not found

  /User/SuperAdmin:
    patch:
      tags: [Users]
      summary: Make user a super admin (requires super_admin rights)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminPromotionRequest'
      responses:
        '200':
          description: User promoted
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid data
        '403':
          description: Forbidden
        '404':
          description: User not found

  # ========== Equipment ==========
  /Equipment:
    get:
      tags: [Equipment]
      summary: Get all equipment
      responses:
        '200':
          description: List of equipment
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment:
                    type: array
                    items:
                      $ref: '#/components/schemas/Equipment'
    post:
      tags: [Equipment]
      summary: Create new equipment (requires admin rights)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentCreateRequest'
      responses:
        '201':
          description: Equipment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment:
                    type: array
                    items:
                      $ref: '#/components/schemas/Equipment'
        '400':
          description: Invalid data
        '403':
          description: Forbidden

  /Equipment/type/{type}:
    get:
      tags: [Equipment]
      summary: Get equipment by type
      parameters:
        - $ref: '#/components/parameters/EquipmentTypePath'
      responses:
        '200':
          description: List of equipment of given type
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment:
                    type: array
                    items:
                      $ref: '#/components/schemas/Equipment'
        '404':
          description: No equipment found

  /Equipment/id/{id}:
    get:
      tags: [Equipment]
      summary: Get equipment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Equipment found
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment:
                    $ref: '#/components/schemas/Equipment'
        '404':
          description: Not found

  /Equipment/{EquipmentId}:
    patch:
      tags: [Equipment]
      summary: Edit equipment (requires admin rights)
      parameters:
        - $ref: '#/components/parameters/EquipmentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentUpdateRequest'
      responses:
        '200':
          description: Updated equipment
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment:
                    $ref: '#/components/schemas/Equipment'
        '400':
          description: Invalid data
        '403':
          description: Forbidden
        '404':
          description: Not found
    delete:
      tags: [Equipment]
      summary: Delete equipment (requires admin rights)
      parameters:
        - $ref: '#/components/parameters/EquipmentIdPath'
      responses:
        '204':
          description: Deleted
        '403':
          description: Forbidden
        '404':
          description: Not found

  /Equipment/status/{EquipmentId}:
    patch:
      tags: [Equipment]
      summary: Change equipment active status (requires admin rights)
      parameters:
        - $ref: '#/components/parameters/EquipmentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentStatusRequest'
      responses:
        '200':
          description: Status updated (returns updated equipment)
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment:
                    $ref: '#/components/schemas/Equipment'
        '403':
          description: Forbidden
        '404':
          description: Not found

  # ========== Bookings ==========
  /Booking:
    get:
      tags: [Bookings]
      summary: Get all bookings
      responses:
        '200':
          description: List of bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
    post:
      tags: [Bookings]
      summary: Create a booking request (status = "Waiting answer")
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: '#/components/schemas/Booking'
        '400':
          description: Invalid data or equipment already booked for this period

  /Booking/user/{id}:
    get:
      tags: [Bookings]
      summary: Get bookings by user ID
      parameters:
        - $ref: '#/components/parameters/UserIdPathAlt'
      responses:
        '200':
          description: List of user's bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
        '404':
          description: User not found or no bookings

  /Booking/equipment/{id}:
    get:
      tags: [Bookings]
      summary: Get bookings by equipment ID
      parameters:
        - $ref: '#/components/parameters/UserIdPathAlt'  # тот же параметр id, но для equipment
      responses:
        '200':
          description: List of equipment's bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
        '404':
          description: Equipment not found or no bookings

  /Booking/{id}:
    put:
      tags: [Bookings]
      summary: Update booking status (or cancel/return). Admin rights required for status change.
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingStatusUpdateRequest'
      responses:
        '200':
          description: Status updated (if status is not Cancel/Returned, returns updated booking)
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: '#/components/schemas/Booking'
        '204':
          description: Booking cancelled or returned (deleted, no content)
        '400':
          description: Invalid data
        '403':
          description: Forbidden (admin rights required)
        '404':
          description: Booking not found

  /Booking/return/{id}:
    put:
      tags: [Bookings]
      summary: Return equipment (deletes booking). Admin rights required.
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      responses:
        '204':
          description: Booking deleted (equipment returned)
        '403':
          description: Forbidden
        '404':
          description: Booking not found